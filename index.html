<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN V11 - BROJJ SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        
        /* Hapus overflow: hidden di body agar bisa di-scroll di HP */
        body { background: #000; color: #a1a1aa; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .panel-bg { background: #09090b; border: 1px solid #27272a; border-radius: 20px; }
        input, select { background: #18181b; border: 1px solid #3f3f46; color: white; outline: none; }
        input:focus { border-color: #2563eb; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        
        .chat-bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 12px; }
        .msg-admin { background: #2563eb; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .msg-user { background: #27272a; color: white; margin-right: auto; border-bottom-left-radius: 4px; }
        .user-list-item.active { background: #18181b; border-left: 3px solid #2563eb; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4 gap-4 bg-black">

    <header class="panel-bg p-4 flex flex-col sm:flex-row justify-between items-center shrink-0 gap-4">
        <div class="flex items-center gap-4 w-full sm:w-auto">
            <i class="fas fa-terminal text-blue-600 text-2xl"></i>
            <div>
                <h1 class="text-white font-black text-xl italic tracking-tight">BROJJ COMMAND <span class="text-blue-600">V11</span></h1>
                <p class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold">Supreme Admin Control</p>
            </div>
        </div>
        <div class="flex gap-3 w-full sm:w-auto justify-end">
            <button id="mt-btn" onclick="toggleMT()" class="px-6 py-2 bg-zinc-800 text-white rounded-lg text-xs font-bold uppercase transition-colors hover:bg-zinc-700">MT: OFF</button>
            <button onclick="wipeDb()" class="px-6 py-2 bg-red-600/20 text-red-500 rounded-lg text-xs font-bold uppercase transition-colors hover:bg-red-600 hover:text-white">Wipe All</button>
        </div>
    </header>

    <div class="flex flex-col lg:flex-row flex-1 gap-6 pb-10">
        
        <div class="w-full lg:w-2/3 flex flex-col gap-4">
            
            <div class="panel-bg p-5 flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="text-[10px] font-bold uppercase text-zinc-500 block mb-1">Durasi</label>
                    <div class="flex gap-2">
                        <input type="number" id="h" placeholder="Jam" value="1" class="w-full p-3 rounded-xl text-center font-bold">
                        <input type="number" id="m" placeholder="Menit" value="0" class="w-full p-3 rounded-xl text-center font-bold">
                    </div>
                </div>
                <div class="flex-1 w-full">
                    <label class="text-[10px] font-bold uppercase text-zinc-500 block mb-1">Target ID (Opsional)</label>
                    <input type="text" id="target" placeholder="DEV-XXXX" class="w-full p-3 rounded-xl text-center font-mono">
                </div>
                <button onclick="deployKey()" class="w-full md:w-auto px-8 py-3 h-[46px] bg-blue-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-blue-500 transition-transform active:scale-95">Deploy Key</button>
            </div>

            <div class="panel-bg flex-1 overflow-hidden flex flex-col min-h-[300px]">
                <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
                    <h2 class="text-white font-bold text-xs uppercase tracking-widest">Active Licenses</h2>
                </div>
                <div class="flex-1 overflow-y-auto custom-scroll p-4">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs min-w-[400px]">
                            <thead class="text-zinc-500 uppercase font-bold border-b border-zinc-800">
                                <tr>
                                    <th class="pb-3">Key</th>
                                    <th class="pb-3">Device</th>
                                    <th class="pb-3">Status</th>
                                    <th class="pb-3 text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="key-table" class="text-zinc-300 font-mono"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-1/3 panel-bg flex flex-col overflow-hidden border-t-4 lg:border-t-0 lg:border-l-4 border-blue-600 h-[500px] lg:h-auto">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                <h2 class="text-white font-bold text-xs uppercase tracking-widest flex items-center gap-2"><i class="fas fa-headset text-blue-500"></i> Live Support</h2>
            </div>
            
            <div class="flex flex-1 overflow-hidden">
                <div class="w-1/3 lg:w-2/5 border-r border-zinc-800 overflow-y-auto custom-scroll" id="chat-users">
                    </div>
                
                <div class="w-2/3 lg:w-3/5 flex flex-col bg-zinc-950">
                    <div id="chat-room" class="flex-1 p-4 overflow-y-auto custom-scroll flex flex-col gap-3">
                        <div class="m-auto text-center text-zinc-600 text-[10px] font-bold uppercase">Pilih user untuk membalas</div>
                    </div>
                    <div class="p-3 bg-zinc-900 border-t border-zinc-800 flex gap-2">
                        <input type="text" id="admin-chat-input" placeholder="Balas..." class="flex-1 p-2 rounded-lg text-xs" onkeypress="if(event.key==='Enter') sendAdminChat()" disabled>
                        <button onclick="sendAdminChat()" class="bg-blue-600 text-white w-10 h-10 shrink-0 rounded-lg flex items-center justify-center hover:bg-blue-500"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://kodangz-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);

        // Core Admin Setup
        window.toggleMT = async () => {
            const s = await get(ref(db, 'system/maintenance'));
            set(ref(db, 'system/maintenance'), !s.val());
        };
        onValue(ref(db, 'system/maintenance'), s => {
            const mt = s.val();
            const btn = document.getElementById('mt-btn');
            btn.innerText = mt ? 'MT: ON' : 'MT: OFF';
            btn.className = mt ? 'px-6 py-2 bg-red-600 text-white rounded-lg text-xs font-bold uppercase' : 'px-6 py-2 bg-zinc-800 text-white rounded-lg text-xs font-bold uppercase';
        });

        window.deployKey = () => {
            const h = parseInt(document.getElementById('h').value)||0;
            const m = parseInt(document.getElementById('m').value)||0;
            const target = document.getElementById('target').value.trim();
            const key = 'BRO-' + Math.random().toString(36).substr(2,6).toUpperCase();
            
            const inbox = {};
            for(let i=0; i<150; i++) {
                inbox['ID'+i] = {
                    label: "ACC_"+Math.random().toString(36).substr(2,4).toUpperCase(),
                    email: Math.random().toString(36).substr(2,8)+"@gmail.com",
                    pw: Math.random().toString(36).substr(2,8)
                };
            }
            
            set(ref(db, `keys/${key}`), { hours: h, minutes: m, status: 'ready', inbox });
            if(target) set(ref(db, `devices/${target}/assignedKey`), key);
            Swal.fire({toast:true, position:'top-end', title:'Key Created: '+key, icon:'success', timer:2000, showConfirmButton:false});
            document.getElementById('target').value = '';
        };

        // Render DB Keys
        onValue(ref(db, 'keys'), s => {
            const t = document.getElementById('key-table');
            t.innerHTML = '';
            const d = s.val() || {};
            Object.keys(d).forEach(k => {
                const item = d[k];
                t.innerHTML += `
                    <tr class="border-b border-zinc-800/50 hover:bg-zinc-900/30 transition-colors">
                        <td class="py-3 pr-2 text-blue-400 font-bold">${k}</td>
                        <td class="py-3 pr-2 text-[11px]">${item.boundDevice || '-'}</td>
                        <td class="py-3 pr-2 text-[10px] uppercase font-bold ${item.status === 'in-use' || item.status === 'active' ? 'text-green-500' : 'text-zinc-500'}">${item.status}</td>
                        <td class="py-3 text-right"><button onclick="remove(ref(db, 'keys/${k}'))" class="text-red-500 hover:text-white p-2 rounded-lg bg-red-500/10"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
            });
        });

        window.wipeDb = () => { if(confirm('Hapus semua key?')) remove(ref(db, 'keys')); };

        // --- LIVE CHAT SYSTEM ---
        let currentTarget = null;
        
        onValue(ref(db, 'devices'), s => {
            const list = document.getElementById('chat-users');
            list.innerHTML = '';
            const d = s.val() || {};
            
            const users = Object.keys(d).filter(k => d[k].lastChat).sort((a,b) => d[b].lastChat - d[a].lastChat);
            
            users.forEach(u => {
                const isUnread = d[u].unreadAdmin;
                list.innerHTML += `
                    <div onclick="selectUser('${u}')" id="usr-${u}" class="user-list-item p-3 border-b border-zinc-800 cursor-pointer hover:bg-zinc-800 flex flex-col ${currentTarget === u ? 'active' : ''}">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-bold text-white truncate mr-2">${u}</span>
                            ${isUnread ? '<span class="w-2 h-2 bg-red-500 rounded-full shrink-0"></span>' : ''}
                        </div>
                        <span class="text-[8px] text-zinc-500">${new Date(d[u].lastChat).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>`;
            });
        });

        window.selectUser = (id) => {
            currentTarget = id;
            document.querySelectorAll('.user-list-item').forEach(e => e.classList.remove('active'));
            document.getElementById(`usr-${id}`).classList.add('active');
            
            const inp = document.getElementById('admin-chat-input');
            inp.disabled = false;
            inp.focus();

            update(ref(db, `devices/${id}`), { unreadAdmin: false });

            onValue(ref(db, `chats/${id}`), s => {
                if(currentTarget !== id) return;
                const room = document.getElementById('chat-room');
                room.innerHTML = `<div class="text-center text-[9px] text-zinc-600 font-bold mb-2 p-2 bg-zinc-900 rounded-lg w-max mx-auto">ID: ${id}</div>`;
                if(s.exists()){
                    Object.values(s.val()).forEach(m => {
                        const isAdmin = m.sender === 'admin';
                        room.innerHTML += `
                            <div class="flex flex-col w-full ${isAdmin ? 'items-end' : 'items-start'}">
                                <div class="chat-bubble ${isAdmin ? 'msg-admin' : 'msg-user'}">${m.text}</div>
                            </div>`;
                    });
                    room.scrollTop = room.scrollHeight;
                }
            });
        };

        window.sendAdminChat = () => {
            if(!currentTarget) return;
            const inp = document.getElementById('admin-chat-input');
            const txt = inp.value.trim();
            if(!txt) return;
            
            push(ref(db, `chats/${currentTarget}`), { sender: 'admin', text: txt, time: Date.now() });
            inp.value = '';
        };

    </script>
</body>
</html>
